<template>

<lightning-card  variant="Narrow"  title="Hello" icon-name="standard:account">

    <div>Hello {showValue} </div>
    <lightning-input type="text" label="Enter some text" value="Type your name.." onchange={handleOnChange}></lightning-input>
    
    <lightning-button-icon  icon-name="utility:down" variant="border-filled" alternative-text="Show More" slot="actions"></lightning-button-icon>
    <lightning-button variant="brand" label="Brand" title="Primary action" onclick={handleClick} class="slds-m-left_x-small"></lightning-button>
    <p class="slds-p-horizontal_small">Card Body Narrow (custom component)</p>
    <p slot="footer">Card Footer</p>

    <template for:each={contacts} for:item="contact">
        <li key={contact.Id}>
            {contact.Name}, {contact.Title}
        </li>
    </template>
    
</lightning-card>
